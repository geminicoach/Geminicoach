<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemini Education — Dashboard</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy:#0a1628; --navy-mid:#0d1f3c; --dark-gray:#1c2a40;
            --blue:#1a6fc4; --blue-bright:#2e8de8; --blue-light:#5aaff5;
            --white:#fff; --off-white:#e8edf5; --gray:#8a9ab5;
            --panel:#0f2138; --line:#1c3354; }
    * { box-sizing:border-box; }
    body { font-family:'Barlow',system-ui,sans-serif; font-weight:300; color:var(--off-white);
           margin:0; background:var(--navy); line-height:1.55; -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }
    nav { position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:10px;
          padding:14px 22px; background:rgba(10,22,40,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
    .logo { width:26px; height:26px; border-radius:7px; background:conic-gradient(from 210deg,var(--blue),var(--blue-light),var(--blue)); }
    nav b { font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:21px; letter-spacing:.06em; }
    nav .sp { flex:1; }
    nav .soon { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:11px; letter-spacing:.12em;
                text-transform:uppercase; color:var(--gray); border:1px solid var(--line); padding:6px 11px; border-radius:99px; }
    .hero { background:radial-gradient(1100px 460px at 12% -25%, rgba(46,141,232,.20) 0, transparent 60%),
            linear-gradient(180deg,#0b1a30,#0a1628); padding:60px 24px 44px; border-bottom:1px solid var(--line); }
    .hero .inner { max-width:1060px; margin:0 auto; }
    .eyebrow { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:600; letter-spacing:.22em;
               text-transform:uppercase; color:var(--blue-light); margin-bottom:14px; }
    .hero h1 { font-family:'Bebas Neue',sans-serif; font-weight:400; margin:0 0 10px; font-size:54px; letter-spacing:.02em; line-height:1; color:#fff; }
    .hero p { margin:0; color:var(--gray); max-width:580px; font-size:16px; }
    .wrap { max-width:1060px; margin:0 auto; padding:8px 24px 70px; }
    section.block { margin-top:38px; }
    .head { display:flex; align-items:baseline; justify-content:space-between; margin:0 2px 16px; }
    .head h2 { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; text-transform:uppercase;
               letter-spacing:.14em; color:var(--off-white); margin:0; }
    .head .sub { font-size:13px; color:var(--gray); }

    .resume { display:flex; align-items:center; justify-content:space-between; gap:16px;
              background:linear-gradient(135deg,#103257,#1a6fc4); border:1px solid #2a72bf; border-radius:14px;
              padding:18px 22px; margin-top:-24px; position:relative; box-shadow:0 14px 34px rgba(0,0,0,.35); }
    .resume .k { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#bfe0ff; }
    .resume h3 { font-family:'Bebas Neue',sans-serif; font-weight:400; letter-spacing:.03em; margin:4px 0 0; font-size:24px; color:#fff; }
    .resume a.btn { background:#fff; color:#0d2747; font-family:'Barlow Condensed',sans-serif; font-weight:700;
                    text-transform:uppercase; letter-spacing:.08em; font-size:14px; padding:11px 18px; border-radius:8px; white-space:nowrap; }

    .stacks { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px; }
    .stack { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:20px; }
    .stack .tag { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--blue-light); }
    .stack h3 { font-family:'Bebas Neue',sans-serif; font-weight:400; letter-spacing:.02em; margin:7px 0 6px; font-size:23px; color:#fff; }
    .stack p { margin:0 0 14px; color:var(--gray); font-size:13.5px; }
    .steps { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .step { display:inline-flex; align-items:center; gap:6px; font-size:12.5px; padding:6px 11px; border-radius:99px;
            border:1px solid #285089; background:rgba(46,141,232,.12); color:#bfe0ff; }
    a.step:hover { background:rgba(46,141,232,.25); }
    .step.locked { background:rgba(255,255,255,.03); color:var(--gray); border-color:var(--line); }
    .step .c { font-weight:700; color:#fff; }
    .arrow { color:#3a5680; font-size:12px; }

    .track h3 { font-family:'Bebas Neue',sans-serif; font-weight:400; letter-spacing:.02em; font-size:24px; margin:22px 2px 12px; color:#fff; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; }
    .card { display:flex; flex-direction:column; background:var(--panel); border:1px solid var(--line); border-radius:14px;
            overflow:hidden; transition:border-color .15s, transform .12s; }
    .cover { position:relative; width:100%; height:120px; overflow:hidden; }
    .cover .h-wrap { position:absolute; inset:0; display:flex; }
    .cover .h-panel { position:relative; display:flex; align-items:flex-end; padding:11px; overflow:hidden; }
    .cover.img .h-panel { width:42%; }
    .cover.img .h-photo { width:58%; overflow:hidden; }
    .cover.full .h-panel { width:100%; }
    .cover .h-photo img { width:100%; height:100%; object-fit:cover; display:block; }
    .cover .h-code { position:relative; z-index:2; font-family:'Bebas Neue',sans-serif; font-size:34px; line-height:.78; color:#fff; }
    .cover .h-motif { position:absolute; top:0; right:-8%; height:100%; width:75%; opacity:.5; pointer-events:none; }
    .cover .accent { position:absolute; left:0; bottom:0; width:100%; height:4px; }
    .card .body { display:flex; flex-direction:column; flex:1; padding:16px 18px 18px; }
    a.card:hover { border-color:var(--blue); transform:translateY(-2px); }
    .card .code { font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.1em; font-size:12px; color:var(--blue-light); }
    .card h4 { font-family:'Barlow Condensed',sans-serif; font-weight:600; margin:6px 0 7px; font-size:18px; color:#fff; }
    .card p { margin:0 0 12px; color:var(--gray); font-size:13px; flex:1; }
    .card .foot { font-family:'Barlow Condensed',sans-serif; font-weight:600; letter-spacing:.06em; text-transform:uppercase; font-size:12px; color:var(--blue-light); }
    .card.soon { opacity:.92; }
    .card.soon .foot { color:var(--gray); }
    footer { max-width:1060px; margin:0 auto; padding:28px 24px 50px; color:var(--gray); font-size:12.5px; border-top:1px solid var(--line); }
    @media (max-width:560px){ .hero h1{font-size:40px} .resume{flex-direction:column; align-items:flex-start} }
  </style>
</head>
<body>
  <nav><div class="logo"></div><b>GEMINI EDUCATION</b><div class="sp"></div>
    <span class="soon">Membership opening soon</span></nav>
  <div class="hero"><div class="inner">
    <div class="eyebrow">Health science, taught like a coach</div>
    <h1>Your Learning Dashboard</h1>
    <p id="tagline"></p>
  </div></div>

  <div class="wrap">
    <div id="resume"></div>
    <section class="block" id="stacks-block">
      <div class="head"><h2>Curated builds</h2><span class="sub">Courses that stack, in order</span></div>
      <div id="stacks" class="stacks"></div>
    </section>
    <section class="block">
      <div class="head"><h2>Browse the library</h2><span id="count" class="sub"></span></div>
      <div id="tracks"></div>
    </section>
  </div>
  <footer>© 2026 Gemini Education. Built for general-population learners and new coaches.</footer>

  <!-- pre-launch curtain -->
  <script>
    (function(){ var K="gemEduPreviewUnlocked";
      function u(){ try{return sessionStorage.getItem(K)==="yes";}catch(e){return false;} }
      if(!u()) location.replace("coming-soon.html");
    })();
  </script>
  <script src="courses-data.js"></script>
  <script>
  (function(){
    function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(m){
      return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[m]; }); }
    var data = window.GEMINI_COURSES || {};
    var courses = data.courses || [];
    var bySlug = {}; courses.forEach(function(c){ bySlug[c.slug]=c; });

    // ---- generated hybrid cover art (color panel + track motif + code, beside photo) ----
    var COLORS={A:{c:"#36c98d",c2:"#1f8f63"},B:{c:"#2e8de8",c2:"#1a6fc4"},C:{c:"#22b6c4",c2:"#147f8a"},D:{c:"#e8a23a",c2:"#b9781f"},E:{c:"#9a6cf0",c2:"#6a44c0"}};
    function motifSVG(track){
      var a=COLORS[track]||COLORS.B, c=a.c, g;
      if(track==="A") g='<circle cx="150" cy="38" r="30"/><circle cx="180" cy="70" r="20"/>';
      else if(track==="B") g='<circle cx="150" cy="60" r="13"/><circle cx="150" cy="60" r="27"/><circle cx="150" cy="60" r="41"/>';
      else if(track==="C") g='<path d="M70 104 A74 74 0 0 1 184 30"/><path d="M104 110 A44 44 0 0 1 184 66"/>';
      else if(track==="D") g='<path d="M120 26 l32 28 l-32 28"/><path d="M150 26 l32 28 l-32 28"/>';
      else g='<path d="M126 30 l20 12 v24 l-20 12 l-20 -12 v-24 z"/><path d="M166 30 l20 12 v24 l-20 12 l-20 -12 v-24 z"/>';
      return '<svg viewBox="0 0 200 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">'+
        '<g fill="none" stroke="'+c+'" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">'+g+'</g></svg>';
    }
    function coverHTML(c){
      var a=COLORS[c.track]||COLORS.B;
      var panel='<div class="h-panel" style="background:linear-gradient(155deg,'+a.c2+',#0c1d36)"><div class="h-motif">'+motifSVG(c.track)+'</div><div class="h-code">'+esc(c.code)+'</div></div>';
      var accent='<div class="accent" style="background:'+a.c+'"></div>';
      if(c.image){
        return '<div class="cover img"><div class="h-wrap">'+panel+'<div class="h-photo"><img loading="lazy" alt="" src="'+esc(c.image)+'"></div></div>'+accent+'</div>';
      }
      return '<div class="cover full"><div class="h-wrap">'+panel+'</div>'+accent+'</div>';
    }
    if (data.site && data.site.tagline) document.getElementById("tagline").textContent = data.site.tagline;

    // --- resume strip (no login; remembers last opened course) ---
    try {
      var last = JSON.parse(localStorage.getItem("gemEduLast")||"null");
      if (last && bySlug[last.slug] && bySlug[last.slug].published) {
        document.getElementById("resume").innerHTML =
          '<div class="resume"><div><div class="k">Jump back in</div><h3>'+esc(bySlug[last.slug].title)+'</h3></div>'+
          '<a class="btn" href="course.html?slug='+encodeURIComponent(last.slug)+'">Resume course →</a></div>';
      }
    } catch(e){}

    // --- curated builds ---
    function stepChip(slug){
      var c = bySlug[slug]; if(!c) return "";
      var live = c.published;
      var inner = '<span class="c">'+esc(c.code)+'</span> '+esc(c.title.split(":")[0]);
      return live
        ? '<a class="step" href="course.html?slug='+encodeURIComponent(slug)+'">'+inner+'</a>'
        : '<span class="step locked" title="Coming soon">'+inner+'</span>';
    }
    document.getElementById("stacks").innerHTML = (data.stacks||[]).map(function(s){
      var steps = s.courses.map(stepChip).join('<span class="arrow">→</span>');
      return '<div class="stack">'+(s.advanced?'<div class="tag">Advanced build</div>':'<div class="tag">Foundational build</div>')+
        '<h3>'+esc(s.name)+'</h3><p>'+esc(s.blurb)+'</p><div class="steps">'+steps+'</div></div>';
    }).join("");

    // --- browse by track ---
    var pub = courses.filter(function(c){return c.published;}).length;
    document.getElementById("count").textContent = pub+" of "+courses.length+" courses available";
    var tracks = data.tracks || [];
    document.getElementById("tracks").innerHTML = '<div class="track">'+tracks.map(function(t){
      var list = courses.filter(function(c){ return c.track===t.id; });
      if(!list.length) return "";
      var cards = list.map(function(c){
        if (c.published) {
          return '<a class="card" href="course.html?slug='+encodeURIComponent(c.slug)+'">'+
            coverHTML(c)+
            '<div class="body"><div class="code">'+esc(c.code)+'</div><h4>'+esc(c.title)+'</h4><p>'+esc(c.description)+'</p>'+
            '<div class="foot">'+((c.chapters||[]).length||"")+' chapters · open →</div></div></a>';
        }
        return '<div class="card soon">'+coverHTML(c)+
          '<div class="body"><div class="code">'+esc(c.code)+'</div><h4>'+esc(c.title)+'</h4>'+
          '<p>'+esc(c.description)+'</p><div class="foot">Coming soon</div></div></div>';
      }).join("");
      return '<h3>'+esc(t.name)+'</h3><div class="grid">'+cards+'</div>';
    }).join("")+'</div>';
  })();
  </script>
</body>
</html>
