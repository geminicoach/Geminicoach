<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Certificate — Gemini Education</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy:#0a1628; --blue:#1a6fc4; --blue-light:#5aaff5; --gold:#b9892b;
            --off-white:#e8edf5; --gray:#8a9ab5; --line:#1c3354; }
    * { box-sizing:border-box; }
    body { font-family:'Barlow',system-ui,sans-serif; font-weight:300; color:var(--off-white); margin:0;
           background:var(--navy); line-height:1.55; -webkit-font-smoothing:antialiased; }
    a { text-decoration:none; }
    nav { display:flex; align-items:center; gap:14px; padding:14px 22px; border-bottom:1px solid var(--line); }
    .logo { width:24px; height:24px; border-radius:6px; background:conic-gradient(from 210deg,var(--blue),var(--blue-light),var(--blue)); }
    nav b { font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:19px; letter-spacing:.06em; color:#fff; }
    nav .sp { flex:1; } nav a.back { color:var(--blue-light); font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:14px; }
    .wrap { max-width:840px; margin:0 auto; padding:30px 22px 70px; }
    .toolbar { display:flex; justify-content:flex-end; gap:10px; margin-bottom:14px; }
    button { padding:11px 20px; border:0; border-radius:9px; background:var(--blue); color:#fff; cursor:pointer;
             font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.08em; font-size:13px; }
    button:hover { background:#2e8de8; }
    .center { text-align:center; color:var(--gray); padding:50px 0; } .center a { color:var(--blue-light); }

    /* the certificate itself (light, print-ready) */
    .cert { background:#fdfdfb; color:#13233c; border:1px solid #d8dee8; border-radius:6px; padding:54px 56px;
            box-shadow:0 20px 60px rgba(0,0,0,.4); position:relative; }
    .cert::before { content:""; position:absolute; inset:14px; border:2px solid #c9a24a; border-radius:3px; pointer-events:none; }
    .cert .inner { position:relative; text-align:center; }
    .cert .brand { font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.28em; text-transform:uppercase; font-size:13px; color:#1a6fc4; }
    .cert h1 { font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:46px; letter-spacing:.04em; margin:14px 0 2px; color:#13233c; }
    .cert .rule { width:70px; height:3px; background:#c9a24a; margin:10px auto 22px; }
    .cert .pre { color:#5b6b86; font-size:14px; }
    .cert .name { font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:40px; letter-spacing:.02em; margin:8px 0; color:#0e1d34; }
    .cert .course { font-size:20px; font-weight:600; color:#13233c; margin:6px 0 2px; }
    .cert .track { color:#5b6b86; font-size:13px; }
    .cert .grid { display:flex; justify-content:center; gap:46px; flex-wrap:wrap; margin:26px 0 4px; }
    .cert .grid .k { font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.1em; font-size:10.5px; color:#8a93a3; }
    .cert .grid .v { font-size:15px; font-weight:600; color:#13233c; margin-top:2px; }
    .cert .foot { display:flex; justify-content:space-between; align-items:flex-end; margin-top:30px; font-size:11.5px; color:#5b6b86; }
    .cert .foot .sig { text-align:left; } .cert .foot .id { text-align:right; }
    .cert .prov { margin-top:18px; font-size:11px; color:#7a8499; }
    @media print {
      nav,.toolbar { display:none !important; }
      body { background:#fff; } .wrap { padding:0; max-width:none; }
      .cert { box-shadow:none; border:none; border-radius:0; }
    }
  </style>
</head>
<body>
  <nav><div class="logo"></div><b>GEMINI EDUCATION</b><div class="sp"></div><a class="back" href="account.html">← My account</a></nav>
  <div class="wrap" id="wrap"><div class="center">Loading…</div></div>

  <script>
    (function(){ var K="gemEduPreviewUnlocked"; function u(){ try{return sessionStorage.getItem(K)==="yes";}catch(e){return false;} } if(!u()) location.replace("coming-soon.html"); })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.js"></script>
  <script>
  (function(){
    var wrap = document.getElementById("wrap");
    var esc = function(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(m){return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[m];}); };
    var slug = new URLSearchParams(location.search).get("slug");
    if (!window.GEM || !window.GEM.ready) { wrap.innerHTML = '<div class="center">Accounts service is starting. Refresh in a minute.</div>'; return; }

    window.GEM.getUser().then(function(user){
      if (!user) { wrap.innerHTML = '<div class="center">Sign in to view your certificate.<br><br><a href="account.html">Sign in →</a></div>'; return; }
      if (!slug) { wrap.innerHTML = '<div class="center">No course specified.</div>'; return; }
      window.GEM.getCertificate(slug).then(function(cert){
        if (!cert) {
          wrap.innerHTML = '<div class="center">No certificate yet for this course.<br>Pass the final exam to earn it.<br><br><a href="exam.html?slug='+encodeURIComponent(slug)+'">Go to the exam →</a></div>';
          return;
        }
        var d = cert.issued_at ? new Date(cert.issued_at) : new Date();
        var date = d.toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });
        var prov = cert.provider_number ? ("NASM Approved Provider No. " + esc(cert.provider_number))
                                        : "NASM CE provider approval pending";
        wrap.innerHTML =
          '<div class="toolbar"><button onclick="window.print()">Print / Save PDF</button></div>'+
          '<div class="cert"><div class="inner">'+
            '<div class="brand">Gemini Education</div>'+
            '<h1>Certificate of Completion</h1><div class="rule"></div>'+
            '<div class="pre">This certifies that</div>'+
            '<div class="name">'+esc(cert.learner_name || user.email)+'</div>'+
            '<div class="pre">has successfully completed the course</div>'+
            '<div class="course">'+esc(cert.course_title)+'</div>'+
            '<div class="grid">'+
              (cert.ceu_value!=null?'<div><div class="k">CEUs</div><div class="v">'+esc(cert.ceu_value)+'</div></div>':'')+
              (cert.contact_hours!=null?'<div><div class="k">Contact hours</div><div class="v">'+esc(cert.contact_hours)+'</div></div>':'')+
              (cert.score!=null?'<div><div class="k">Exam score</div><div class="v">'+esc(cert.score)+'%</div></div>':'')+
              '<div><div class="k">Date</div><div class="v">'+esc(date)+'</div></div>'+
            '</div>'+
            '<div class="foot"><div class="sig">Gemini Education<br>Parker Gruenhagen</div>'+
              '<div class="id">Certificate No.<br><b>'+esc(cert.certificate_no)+'</b></div></div>'+
            '<div class="prov">'+prov+'</div>'+
          '</div></div>';
      });
    });
  })();
  </script>
</body>
</html>
