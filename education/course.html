<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Course — Gemini Education</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy:#0a1628; --navy-mid:#0d1f3c; --blue:#1a6fc4; --blue-bright:#2e8de8; --blue-light:#5aaff5;
            --white:#fff; --off-white:#e8edf5; --gray:#8a9ab5; --panel:#0f2138; --line:#1c3354; }
    * { box-sizing:border-box; }
    body { font-family:'Barlow',system-ui,sans-serif; font-weight:300; color:var(--off-white);
           margin:0; background:var(--navy); line-height:1.55; -webkit-font-smoothing:antialiased; }
    a { text-decoration:none; }
    nav { position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:14px; padding:14px 22px;
          background:rgba(10,22,40,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
    .logo { width:24px; height:24px; border-radius:6px; background:conic-gradient(from 210deg,var(--blue),var(--blue-light),var(--blue)); }
    nav b { font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:19px; letter-spacing:.06em; color:#fff; }
    nav .sp { flex:1; }
    nav a.back { color:var(--blue-light); font-family:'Barlow Condensed',sans-serif; font-weight:600; letter-spacing:.04em; font-size:14px; }
    nav a.acct { color:#fff; background:var(--blue); font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.04em;
                 font-size:13px; text-transform:uppercase; padding:7px 13px; border-radius:8px; }
    nav a.acct:hover { background:var(--blue-bright); }
    .hero { background:radial-gradient(1000px 380px at 12% -20%, rgba(46,141,232,.18) 0, transparent 60%),
            linear-gradient(180deg,#0b1a30,#0a1628); padding:48px 24px 38px; border-bottom:1px solid var(--line); }
    .coverband { width:100%; height:200px; overflow:hidden; border-bottom:1px solid var(--line); }
    .coverband img { width:100%; height:100%; object-fit:cover; display:block; }
    .hero .inner { max-width:880px; margin:0 auto; }
    .kicker { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:13px; letter-spacing:.2em; text-transform:uppercase; color:var(--blue-light); margin-bottom:12px; }
    .hero h1 { font-family:'Bebas Neue',sans-serif; font-weight:400; margin:0 0 12px; font-size:42px; letter-spacing:.02em; line-height:1.02; color:#fff; }
    .hero p { margin:0; color:var(--gray); max-width:640px; }
    .meta { margin-top:18px; display:flex; gap:10px 18px; flex-wrap:wrap; font-size:13px; color:var(--gray); }
    .meta b { color:#fff; }
    .wrap { max-width:880px; margin:0 auto; padding:24px 24px 30px; }
    .start { display:inline-flex; align-items:center; gap:8px; background:var(--blue); color:#fff;
             font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
             font-size:15px; padding:13px 22px; border-radius:9px; box-shadow:0 8px 22px rgba(26,111,196,.35); margin-bottom:22px; }
    .start:hover { background:var(--blue-bright); }
    .ch { display:flex; gap:15px; align-items:flex-start; background:var(--panel); border:1px solid var(--line);
          border-radius:12px; padding:16px 18px; margin-bottom:11px; }
    .num { flex:0 0 36px; height:36px; border-radius:9px; background:rgba(46,141,232,.14); color:var(--blue-light);
           font-family:'Barlow Condensed',sans-serif; font-weight:700; display:flex; align-items:center; justify-content:center; }
    .ch h3 { font-family:'Barlow Condensed',sans-serif; font-weight:600; margin:0 0 3px; font-size:17px; color:#fff; }
    .ch p { margin:0 0 9px; color:var(--gray); font-size:13.5px; }
    .links { display:flex; gap:8px; flex-wrap:wrap; }
    .links a { font-size:12.5px; padding:6px 12px; border-radius:8px; border:1px solid var(--line); color:var(--gray); }
    .links a.read { color:#fff; background:var(--blue); border-color:var(--blue);
                    font-family:'Barlow Condensed',sans-serif; font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
    .links a.read:hover { background:var(--blue-bright); }
    .links a.aux:hover { color:#fff; border-color:#2a4a78; }
    .rt { margin-left:auto; align-self:flex-start; font-size:12px; color:var(--gray); white-space:nowrap; }
    .included { display:flex; gap:8px 22px; flex-wrap:wrap; margin:26px 2px 6px; font-size:13px; color:var(--gray); }
    .included b { color:#fff; }
    .ce { margin-top:28px; background:linear-gradient(135deg,#103257,#143a63); border:1px solid #2a5285; border-radius:14px; padding:22px 24px; }
    .ce-h { font-family:'Bebas Neue',sans-serif; font-weight:400; letter-spacing:.03em; font-size:25px; color:#fff; margin-bottom:5px; }
    .ce p { margin:0 0 15px; color:#bfd3ee; font-size:14px; max-width:620px; }
    .ce-links { display:flex; gap:10px; flex-wrap:wrap; }
    .ce-btn { font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.06em; font-size:14px;
              padding:11px 18px; border-radius:9px; background:var(--blue); color:#fff; }
    .ce-btn:hover { background:var(--blue-bright); }
    .ce-btn.ghost { background:transparent; border:1px solid #3a5e92; color:#bfd3ee; }
    .ce-btn.ghost:hover { color:#fff; border-color:#5aaff5; }
    .ce-btn.locked { background:rgba(255,255,255,.05); color:var(--gray); border:1px solid var(--line); cursor:not-allowed; }
    .prog { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 18px; margin-bottom:18px; }
    .prog-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px; gap:12px; }
    .prog-k { font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.1em; font-size:12px; color:var(--blue-light); }
    .prog-v { font-size:13px; color:var(--gray); }
    .bar { height:8px; background:#10243f; border-radius:99px; overflow:hidden; }
    .fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--blue-bright)); border-radius:99px; transition:width .25s; }
    .ch.done { border-color:#2a6b46; background:linear-gradient(180deg,rgba(46,204,113,.07),var(--panel)); }
    .rt .donew { display:flex; align-items:center; gap:6px; margin-top:10px; font-size:12.5px; color:var(--off-white); cursor:pointer; white-space:nowrap; }
    .rt .donew input { cursor:pointer; width:15px; height:15px; }
    footer { max-width:880px; margin:0 auto; padding:24px; color:var(--gray); font-size:12.5px; border-top:1px solid var(--line); }
    .loading { color:var(--gray); padding:36px 0; text-align:center; }
    .info { color:var(--gray); padding:30px 0; max-width:560px; }
    @media (max-width:560px){ .hero h1{font-size:32px} .rt .mins{display:none} }
  </style>
</head>
<body>
  <nav><div class="logo"></div><b>GEMINI EDUCATION</b><div class="sp"></div>
    <a class="acct" href="account.html">My account</a>
    <a class="back" href="index.html">← Dashboard</a></nav>
  <div id="hero" class="hero"><div class="inner"><h1>Loading…</h1></div></div>
  <div class="wrap"><div id="body"><div class="loading">Loading…</div></div></div>
  <footer>© 2026 Gemini Education</footer>

  <!-- pre-launch curtain -->
  <script>
    (function () {
      var KEY = "gemEduPreviewUnlocked";
      function unlocked(){ try { return sessionStorage.getItem(KEY) === "yes"; } catch (e) { return false; } }
      if (!unlocked()) { location.replace("coming-soon.html"); }
    })();
  </script>
  <script src="courses-data.js"></script>
  <script>
    (function () {
      function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(m){
        return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[m]; }); }
      function qs(k){ return new URLSearchParams(location.search).get(k); }
      var data = window.GEMINI_COURSES;
      var hero = document.getElementById("hero"), body = document.getElementById("body");
      if (!data || !data.courses) { hero.innerHTML = '<div class="inner"><h1>Couldn\'t load course.</h1></div>'; body.innerHTML=""; return; }
      var slug = qs("slug");
      var c = data.courses.filter(function(x){ return x.slug === slug; })[0];
      if (!c) { hero.innerHTML = '<div class="inner"><h1>Course not found</h1></div>'; body.innerHTML=""; return; }

      var trackName = c.track;
      (data.tracks||[]).forEach(function(t){ if(t.id===c.track) trackName=t.name; });
      try { localStorage.setItem("gemEduLast", JSON.stringify({slug:c.slug, title:c.title})); } catch(e){}

      document.title = c.title + " — Gemini Education";
      var chs = c.chapters || [];
      if (c.image) { hero.insertAdjacentHTML('beforebegin', '<div class="coverband"><img alt="" src="'+esc(c.image)+'"></div>'); }
      hero.innerHTML = '<div class="inner">'
        + '<div class="kicker">' + esc(c.code) + ' · ' + esc(trackName) + '</div>'
        + '<h1>' + esc(c.title) + '</h1><p>' + esc(c.description) + '</p>'
        + (chs.length ? '<div class="meta"><span><b>' + chs.length + '</b> chapters</span>'
            + '<span><b>~' + esc(c.minutes_per_chapter||60) + ' min</b> each</span>'
            + (c.outcomes ? '<span><b>' + esc(c.outcomes) + '</b> learning outcomes</span>' : '') + '</div>' : '')
        + '</div>';

      if (!chs.length) {
        body.innerHTML = '<div class="info"><p style="font-size:17px;color:#fff"><strong>This course is coming soon.</strong></p>'
          + '<p>It\'s mapped and on the build list. In the meantime, dive into what\'s live from the '
          + '<a href="index.html" style="color:#5aaff5">dashboard</a>.</p></div>';
        return;
      }

      var first = chs[0];
      var startBtn = (first && first.reading)
        ? '<a class="start" href="' + esc(first.reading) + '">Start with Chapter 1 &nbsp;→</a>' : '';

      // --- per-chapter completion (saved locally, per course) ---
      var PKEY = "gemEduProgress:" + c.slug;
      function getDone(){ try { return JSON.parse(localStorage.getItem(PKEY)||"[]"); } catch(e){ return []; } }
      function setDone(a){ try { localStorage.setItem(PKEY, JSON.stringify(a)); } catch(e){} }
      function isDone(pos){ return getDone().indexOf(pos) !== -1; }
      function markDone(pos){ var a=getDone(); if(a.indexOf(pos)===-1){ a.push(pos); setDone(a); } }
      function toggleDone(pos){ var a=getDone(); var i=a.indexOf(pos); if(i===-1) a.push(pos); else a.splice(i,1); setDone(a); }
      function doneCount(){ return chs.filter(function(ch){ return isDone(ch.position); }).length; }

      var list = chs.map(function (ch) {
        var done = isDone(ch.position);
        return '<div class="ch' + (done?' done':'') + '" data-pos="' + esc(ch.position) + '"><div class="num">' + esc(ch.position) + '</div><div>'
          + '<h3>' + esc(ch.title) + '</h3><p>' + esc(ch.subtitle||"") + '</p>'
          + '<div class="links">'
          + (ch.reading ? '<a class="read" href="' + esc(ch.reading) + '">Read chapter</a>' : '')
          + (ch.quiz ? '<a class="aux" href="' + esc(ch.quiz) + '">Quiz</a>' : '')
          + (ch.challenge ? '<a class="aux" href="' + esc(ch.challenge) + '">Weekly challenge</a>' : '')
          + '</div></div>'
          + '<div class="rt"><span class="mins">~' + esc(ch.minutes||c.minutes_per_chapter||60) + ' min</span>'
          + '<label class="donew"><input type="checkbox" class="donecb" data-pos="' + esc(ch.position) + '"' + (done?' checked':'') + '> Done</label>'
          + '</div></div>';
      }).join("");

      var nQuiz = chs.filter(function(x){return x.quiz;}).length;
      var nChal = chs.filter(function(x){return x.challenge;}).length;
      var included = '<div class="included"><span><b>' + chs.length + '</b> chapter readings</span>'
        + '<span><b>' + nQuiz + '</b> quizzes</span><span><b>' + nChal + '</b> weekly challenges</span></div>';

      function progressHTML(){
        var d=doneCount(), n=chs.length, pct=n?Math.round(d/n*100):0;
        return '<div class="prog"><div class="prog-top"><span class="prog-k">Your progress</span>'
          + '<span class="prog-v">' + d + ' of ' + n + ' chapters complete</span></div>'
          + '<div class="bar"><div class="fill" style="width:' + pct + '%"></div></div></div>';
      }
      function ceHTML(){
        var complete = chs.length>0 && doneCount() >= chs.length;
        var examBtn = complete
          ? '<a class="ce-btn" href="exam.html?slug=' + encodeURIComponent(c.slug) + '">Take the final exam &nbsp;→</a>'
          : '<span class="ce-btn locked">Complete all chapters to unlock</span>';
        return '<div class="ce"><div class="ce-h">Earn your certificate</div>'
          + '<p>Finish every chapter above, then pass the final exam (80% to pass, retakes allowed) to earn your certificate of completion. A free account saves your result.</p>'
          + '<div class="ce-links">' + examBtn
          + '<a class="ce-btn ghost" href="certificate.html?slug=' + encodeURIComponent(c.slug) + '">My certificate</a>'
          + '</div></div>';
      }

      body.innerHTML = startBtn + '<div id="prog-slot">' + progressHTML() + '</div>'
        + list + included + '<div id="ce-slot">' + ceHTML() + '</div>';

      function repaint(){
        var ps=document.getElementById("prog-slot"); if(ps) ps.innerHTML=progressHTML();
        var cs=document.getElementById("ce-slot"); if(cs) cs.innerHTML=ceHTML();
      }
      body.addEventListener("change", function(e){
        var t=e.target;
        if (t && t.classList && t.classList.contains("donecb")){
          toggleDone(Number(t.getAttribute("data-pos")));
          var row=t.closest(".ch"); if(row) row.classList.toggle("done", t.checked);
          repaint();
        }
      });
      body.addEventListener("click", function(e){
        var a=e.target;
        if (a && a.classList && a.classList.contains("read")){
          var row=a.closest(".ch"); if(row) markDone(Number(row.getAttribute("data-pos")));
        }
      });
    })();
  </script>
</body>
</html>
