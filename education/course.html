<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Course — Gemini Education</title>
  <link rel="icon" href="data:," />
  <style>
    :root { --ink:#15171c; --muted:#6b7280; --line:#e6e9ef; --accent:#1f6feb;
            --accent-ink:#1858c4; --soft:#eef3fb; --bg:#f7f9fc; }
    * { box-sizing:border-box; }
    body { font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--ink);
           margin:0; background:var(--bg); line-height:1.55; -webkit-font-smoothing:antialiased; }
    nav { position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:14px;
          padding:13px 22px; background:rgba(255,255,255,.86); backdrop-filter:blur(8px);
          border-bottom:1px solid var(--line); }
    .logo { width:24px; height:24px; border-radius:6px;
            background:conic-gradient(from 210deg,#2f6df6,#7aa7ff,#2f6df6); }
    nav b { font-size:14.5px; } nav .sp { flex:1; }
    nav a.back { color:var(--accent); text-decoration:none; font-size:14px; }
    .hero { background:radial-gradient(1000px 360px at 12% -10%, #244a82 0, transparent 60%),
            linear-gradient(135deg,#0e1a2c,#1d3a5f); background-color:#0f1c30; color:#fff;
            padding:42px 24px 36px; }
    .hero .inner { max-width:880px; margin:0 auto; }
    .kicker { font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#8fb4ef; margin-bottom:11px; }
    .hero h1 { margin:0 0 11px; font-size:28px; letter-spacing:-.01em; }
    .hero p { margin:0; color:#bccadd; max-width:640px; }
    .meta { margin-top:18px; display:flex; gap:10px 18px; flex-wrap:wrap; font-size:13px; color:#9fb0c7; }
    .meta b { color:#fff; }
    .wrap { max-width:880px; margin:0 auto; padding:24px 24px 30px; }
    .start { display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:#fff;
             text-decoration:none; font-weight:600; font-size:15px; padding:12px 20px; border-radius:10px;
             box-shadow:0 6px 18px rgba(31,111,235,.28); margin-bottom:22px; }
    .start:hover { background:var(--accent-ink); }
    .ch { display:flex; gap:15px; align-items:flex-start; background:#fff; border:1px solid var(--line);
          border-radius:13px; padding:16px 18px; margin-bottom:11px; box-shadow:0 1px 2px rgba(16,30,54,.04); }
    .num { flex:0 0 36px; height:36px; border-radius:9px; background:var(--soft); color:var(--accent-ink);
           font-weight:700; display:flex; align-items:center; justify-content:center; }
    .ch h3 { margin:0 0 3px; font-size:16px; letter-spacing:-.005em; }
    .ch p { margin:0 0 9px; color:var(--muted); font-size:13.5px; }
    .links { display:flex; gap:8px; flex-wrap:wrap; }
    .links a { font-size:12.5px; text-decoration:none; padding:5px 11px; border-radius:8px; border:1px solid var(--line); }
    .links a.read { color:#fff; background:var(--accent); border-color:var(--accent); }
    .links a.read:hover { background:var(--accent-ink); }
    .links a.aux { color:var(--muted); } .links a.aux:hover { color:var(--ink); border-color:#c9d0db; }
    .rt { margin-left:auto; align-self:flex-start; font-size:12px; color:#9aa3b2; white-space:nowrap; }
    .included { display:flex; gap:8px 22px; flex-wrap:wrap; margin:26px 2px 6px; font-size:13px; color:var(--muted); }
    .included b { color:var(--ink); }
    footer { max-width:880px; margin:0 auto; padding:24px; color:#9aa3b2; font-size:12.5px;
             border-top:1px solid var(--line); }
    .loading,.info { color:var(--muted); padding:36px 0; text-align:center; }
    @media (max-width:560px){ .hero h1{font-size:24px} .rt{display:none} }
  </style>
</head>
<body>
  <nav><div class="logo"></div><b>Gemini Education</b><div class="sp"></div>
    <a class="back" href="index.html">← All courses</a></nav>
  <div id="hero" class="hero"><div class="inner"><h1>Loading…</h1></div></div>
  <div class="wrap"><div id="body"><div class="loading">Loading…</div></div></div>
  <footer>© 2026 Gemini Education</footer>

  <!-- pre-launch curtain -->
  <script>
    (function () {
      var KEY = "gemEduPreviewUnlocked";
      function unlocked(){ try { return sessionStorage.getItem(KEY) === "yes"; } catch (e) { return false; } }
      if (!unlocked()) { location.replace("coming-soon.html"); }
    })();
  </script>
  <script src="courses-data.js"></script>
  <script>
    (function () {
      function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(m){
        return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[m]; }); }
      function qs(k){ return new URLSearchParams(location.search).get(k); }
      var data = window.GEMINI_COURSES;
      var hero = document.getElementById("hero"), body = document.getElementById("body");
      if (!data || !data.courses) { hero.innerHTML = '<div class="inner"><h1>Couldn\'t load course.</h1></div>'; body.innerHTML=""; return; }
      var slug = qs("slug");
      var c = data.courses.filter(function(x){ return x.slug === slug; })[0];
      if (!c) { hero.innerHTML = '<div class="inner"><h1>Course not found</h1></div>'; body.innerHTML=""; return; }

      document.title = c.title + " — Gemini Education";
      var chs = c.chapters || [];
      hero.innerHTML = '<div class="inner">'
        + '<div class="kicker">' + esc(c.code) + ' · ' + esc(c.track) + '</div>'
        + '<h1>' + esc(c.title) + '</h1><p>' + esc(c.description) + '</p>'
        + '<div class="meta"><span><b>' + chs.length + '</b> chapters</span>'
        + '<span><b>~' + esc(c.minutes_per_chapter||60) + ' min</b> each</span>'
        + (c.outcomes ? '<span><b>' + esc(c.outcomes) + '</b> learning outcomes</span>' : '') + '</div></div>';

      var first = chs[0];
      var startBtn = (first && first.reading)
        ? '<a class="start" href="' + esc(first.reading) + '">Start with Chapter 1 &nbsp;→</a>' : '';
      var list = chs.map(function (ch) {
        return '<div class="ch"><div class="num">' + esc(ch.position) + '</div><div>'
          + '<h3>' + esc(ch.title) + '</h3><p>' + esc(ch.subtitle||"") + '</p>'
          + '<div class="links">'
          + (ch.reading ? '<a class="read" href="' + esc(ch.reading) + '">Read chapter</a>' : '')
          + (ch.quiz ? '<a class="aux" href="' + esc(ch.quiz) + '">Quiz</a>' : '')
          + (ch.challenge ? '<a class="aux" href="' + esc(ch.challenge) + '">Weekly challenge</a>' : '')
          + '</div></div><div class="rt">~' + esc(ch.minutes||c.minutes_per_chapter||60) + ' min</div></div>';
      }).join("");
      var nQuiz = chs.filter(function(x){return x.quiz;}).length;
      var nChal = chs.filter(function(x){return x.challenge;}).length;
      var included = '<div class="included"><span><b>' + chs.length + '</b> chapter readings</span>'
        + '<span><b>' + nQuiz + '</b> quizzes</span><span><b>' + nChal + '</b> weekly challenges</span></div>';
      body.innerHTML = startBtn + list + included;
    })();
  </script>
</body>
</html>
