<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemini Education — Coming soon</title>
  <style>
    :root { --ink:#1a1a1a; --muted:#777; --line:#e5e5e5; --accent:#1f6feb; }
    * { box-sizing:border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; color:var(--ink);
           margin:0; min-height:100vh; display:flex; align-items:center;
           justify-content:center; background:#0f1115; }
    .card { text-align:center; color:#fff; padding:40px; max-width:440px; }
    .badge { font-size:12px; letter-spacing:.14em; text-transform:uppercase;
             color:#9aa4b2; margin-bottom:14px; }
    h1 { font-size:30px; margin:0 0 10px; }
    p { color:#aab2bf; margin:0 0 26px; line-height:1.5; }
    .peek { display:flex; gap:8px; justify-content:center; }
    input { padding:11px 13px; border:1px solid #2a2f3a; background:#161a22; color:#fff;
            border-radius:8px; font-size:15px; width:200px; }
    button { padding:11px 16px; border:0; border-radius:8px; background:var(--accent);
             color:#fff; font-weight:600; cursor:pointer; }
    .err { color:#ff8585; font-size:13px; min-height:18px; margin-top:12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Gemini Education</div>
    <h1>Something good is coming.</h1>
    <p>Our course library is on the way. Check back soon.</p>
    <div class="peek">
      <input id="code" type="password" placeholder="Preview passcode" autocomplete="off" />
      <button id="go" type="button">Enter</button>
    </div>
    <div class="err" id="err"></div>
  </div>

  <script type="module">
    import { unlock, isUnlocked } from "./gate.js";
    if (isUnlocked()) location.href = "index.html";
    const go = () => {
      if (unlock(document.getElementById("code").value)) location.href = "index.html";
      else document.getElementById("err").textContent = "Incorrect passcode.";
    };
    document.getElementById("go").onclick = go;
    document.getElementById("code").addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
  </script>
</body>
</html>
