<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemini Education — Coming soon</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy:#0a1628; --blue:#1a6fc4; --blue-bright:#2e8de8; --blue-light:#5aaff5; --gray:#8a9ab5; --line:#1c3354; }
    * { box-sizing:border-box; }
    body { font-family:'Barlow',system-ui,sans-serif; font-weight:300; margin:0; min-height:100vh;
           display:flex; align-items:center; justify-content:center; color:#e8edf5;
           background:radial-gradient(1100px 520px at 50% -10%, rgba(46,141,232,.18) 0, transparent 60%), var(--navy); }
    .card { text-align:center; padding:40px; max-width:460px; }
    .logo { width:42px; height:42px; border-radius:11px; margin:0 auto 20px;
            background:conic-gradient(from 210deg,var(--blue),var(--blue-light),var(--blue)); }
    .badge { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:13px; letter-spacing:.22em;
             text-transform:uppercase; color:var(--blue-light); margin-bottom:16px; }
    h1 { font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:46px; letter-spacing:.02em; line-height:1.02; margin:0 0 12px; color:#fff; }
    p { color:var(--gray); margin:0 0 28px; line-height:1.5; }
    .peek { display:flex; gap:8px; justify-content:center; }
    input { padding:12px 14px; border:1px solid var(--line); background:#0e1f38; color:#fff; border-radius:9px; font-size:15px; width:210px; font-family:'Barlow',sans-serif; }
    input::placeholder { color:#67809f; }
    button { padding:12px 18px; border:0; border-radius:9px; background:var(--blue); color:#fff; cursor:pointer;
             font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.08em; font-size:14px; }
    button:hover { background:var(--blue-bright); }
    .err { color:#ff8585; font-size:13px; min-height:18px; margin-top:14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <div class="badge">Gemini Education</div>
    <h1>Something good is coming.</h1>
    <p>Our course library is on the way. Check back soon.</p>
    <div class="peek">
      <input id="code" type="password" placeholder="Preview passcode" autocomplete="off" />
      <button id="go" type="button">Enter</button>
    </div>
    <div class="err" id="err"></div>
  </div>
  <script>
    (function () {
      var KEY = "gemEduPreviewUnlocked", PASS = "gemini-preview";
      function unlocked(){ try { return sessionStorage.getItem(KEY) === "yes"; } catch (e) { return false; } }
      if (unlocked()) { location.replace("index.html"); return; }
      function go() {
        var v = document.getElementById("code").value;
        if (v === PASS) { try { sessionStorage.setItem(KEY, "yes"); } catch (e) {} location.replace("index.html"); }
        else { document.getElementById("err").textContent = "Incorrect passcode."; }
      }
      document.getElementById("go").onclick = go;
      document.getElementById("code").addEventListener("keydown", function (e){ if (e.key === "Enter") go(); });
    })();
  </script>
</body>
</html>
