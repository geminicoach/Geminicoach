<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Received — Gemini Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0a1628;--blue:#1a6fc4;--blue-bright:#2e8de8;--blue-light:#5aaff5;--white:#fff;--gray:#8a9ab5;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
  .check{font-family:'Bebas Neue',sans-serif;font-size:5rem;color:var(--blue-bright);line-height:1;margin-bottom:1rem;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,6vw,5rem);color:var(--white);margin-bottom:1rem;}
  h1 em{font-style:normal;color:var(--blue-bright);}
  p{font-size:1rem;color:var(--gray);line-height:1.8;max-width:480px;margin:0 auto 2.5rem;}
  .btn{display:inline-block;background:var(--blue);color:var(--white);text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:0.15em;text-transform:uppercase;padding:1rem 2.5rem;border:2px solid var(--blue-bright);transition:all 0.25s;}
  .btn:hover{background:var(--blue-bright);}
  .logo{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);}
  .logo img{height:48px;}
</style>
</head>
<body>
<div class="logo"><a href="index.html"><img src="images/logo.png" alt="Gemini Coach"></a></div>
<div class="check">✓</div>
<h1>Message <em>Received.</em></h1>
<p>Thanks for reaching out. I'll get back to you as soon as I can. In the meantime, follow along on Instagram for content, updates, and a look at what goes into the work.</p>
<a href="index.html" class="btn">Back to Home</a>
</body>
</html>
